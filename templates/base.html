<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50">
    <!-- Header con navegación -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-8">
                <h1 class="text-2xl font-bold text-amber-900">☕ Coffee Shop</h1>
                {% if user.is_authenticated %}
                    <p class="text-gray-600">Bienvenido, <span class="font-semibold">{{ user.username }}</span></p>
                {% endif %}
            </div>
            
            <!-- Botones en el lado derecho -->
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'my_order' %}" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-medium transition">
                        📦 Mi Pedido
                    </a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition">
                            Cerrar sesión
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition">
                        Iniciar sesión
                    </a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <div class="container mx-auto p-4">
        {% block content %}{% endblock content %}
    </div>
    
</body>
</html>
